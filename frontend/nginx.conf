server {
    listen 80;
    server_name _;

    # The compiled Vite bundle is copied into this directory in the final image.
    root /usr/share/nginx/html;
    index index.html;

    # Keep static asset serving simple and cache-friendly.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Support SPA routing by falling back to index.html for non-file routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
