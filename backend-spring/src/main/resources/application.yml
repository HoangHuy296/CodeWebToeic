server:
  port: ${PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}
  forward-headers-strategy: framework

spring:
  application:
    name: backend-spring
  jackson:
    mapper:
      accept-case-insensitive-enums: true
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ivyts_1997?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  cors:
    allowed-origins: ${CLIENT_URL:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost}
  security:
    jwt-access-secret: ${JWT_ACCESS_SECRET:replace-me}
    jwt-refresh-secret: ${JWT_REFRESH_SECRET:replace-me}
  media:
    cloudinary-cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    cloudinary-api-key: ${CLOUDINARY_API_KEY:}
    cloudinary-api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    org.springframework.security: INFO
