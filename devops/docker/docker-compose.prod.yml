services:
  frontend:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ../../backend-spring
      dockerfile: Dockerfile
      target: production
    environment:
      PORT: 5000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      MYSQL_URL: ${MYSQL_URL:-jdbc:mysql://mysql:3306/ivyts_1997?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-ivyts}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ivyts}
      CLIENT_URL: ${CLIENT_URL:-http://localhost,http://localhost:80,http://localhost:8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-me1}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-me}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 20s

  nginx:
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ivyts_1997}
      MYSQL_USER: ${MYSQL_USER:-ivyts}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ivyts}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s