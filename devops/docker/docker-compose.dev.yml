services:
  frontend:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
      target: development
    environment:
      VITE_API_URL: ${DEV_VITE_API_URL:-http://localhost:5000/api}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev --workspace frontend -- --host 0.0.0.0 --port 5173
    volumes:
      - ../../frontend:/app/frontend
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ../../backend-spring
      dockerfile: Dockerfile
      target: development
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      LOGGING_LEVEL_COM_NSC_VESR: "DEBUG"  # Bổ sung cấu hình log theo format VESR
      MYSQL_URL: ${MYSQL_URL:-jdbc:mysql://mysql:3306/ivyts_1997?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-ivyts}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ivyts}
      CLIENT_URL: ${DEV_CLIENT_URL:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-me1}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-me}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    command: mvn -B spring-boot:run
    volumes:
      - ../../backend-spring/src:/app/src
      - ../../backend-spring/pom.xml:/app/pom.xml:ro
    ports:
      - "${BACKEND_DEV_PORT:-5000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ivyts_1997}
      MYSQL_USER: ${MYSQL_USER:-ivyts}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ivyts}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
