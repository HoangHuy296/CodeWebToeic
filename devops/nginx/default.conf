# Upgrade header mapping is kept so the Spring backend can later reintroduce
# the notification WebSocket endpoint without changing the edge proxy again.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend-app:5000;
}

server {
    listen 80;
    server_name _;

    # Adjust if you expect larger uploads later (avatars, media metadata, etc.).
    client_max_body_size 20m;

    # Reverse proxy all API traffic to the Spring Boot backend.
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reserve the existing notification WebSocket route for Spring parity work.
    location /ws/notifications {
        proxy_pass http://backend_upstream/ws/notifications;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    # The frontend container serves the built Vite bundle and handles SPA fallback itself.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
