services:
  # Production frontend: compiled Vite app served from an internal Nginx container.
  frontend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    networks:
      - app

  # Production backend: compiled Node.js API with MongoDB connectivity.
  backend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      USE_IN_MEMORY_DB: "false"
      # Override localhost for containers while still allowing the host-side .env file to exist.
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/ivyts-1997}
      CLIENT_URL: ${CLIENT_URL:-http://localhost,http://localhost:80,http://localhost:8080}
    volumes:
      - ./backend/.env:/app/backend/.env:ro
    expose:
      - "5000"
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - app

  # Edge Nginx: public entrypoint that routes web traffic and API/WebSocket traffic.
  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - app

  # MongoDB persistence layer.
  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: ivyts-1997
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    restart: unless-stopped
    networks:
      - app

  # Optional MongoDB UI for local inspection.
  mongo-express:
    profiles: ["tools"]
    image: mongo-express:1.0.2-20-alpine3.19
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    restart: unless-stopped
    networks:
      - app

  # Development frontend with Vite hot reload.
  frontend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    environment:
      VITE_API_URL: ${DEV_VITE_API_URL:-http://localhost:5000/api}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev --workspace frontend -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    depends_on:
      - backend-dev
    restart: unless-stopped
    networks:
      - app

  # Development backend with tsx watch-based hot reload.
  backend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      USE_IN_MEMORY_DB: "false"
      MONGO_URI: ${DEV_MONGO_URI:-mongodb://mongo:27017/ivyts-1997}
      CLIENT_URL: ${DEV_CLIENT_URL:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
    command: npm run dev
    volumes:
      - ./backend:/app/backend
      - ./backend/.env:/app/backend/.env:ro
    ports:
      - "${BACKEND_DEV_PORT:-5000}:5000"
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mongo_data:
