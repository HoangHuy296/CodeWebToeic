services:
  # Production frontend: compiled Vite app served from an internal Nginx container.
  frontend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app

  # Production backend: Spring Boot API running on MySQL + Flyway by default.
  backend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: backend-spring/Dockerfile
      target: production
    environment:
      PORT: 5000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      MYSQL_URL: ${MYSQL_URL:-jdbc:mysql://mysql:3306/ivyts_1997?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-ivyts}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ivyts}
      CLIENT_URL: ${CLIENT_URL:-http://localhost,http://localhost:80,http://localhost:8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-me1}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-me}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      app:
        aliases:
          - backend-app

  # Edge Nginx: public entrypoint that routes web traffic and API/WebSocket traffic.
  nginx:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app

  # Primary relational runtime for the Spring backend.
  mysql:
    profiles: ["mysql"]
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ivyts_1997}
      MYSQL_USER: ${MYSQL_USER:-ivyts}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ivyts}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - app

  # Development frontend with Vite hot reload.
  frontend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    environment:
      VITE_API_URL: ${DEV_VITE_API_URL:-http://localhost:5000/api}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev --workspace frontend -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    depends_on:
      backend-dev:
        condition: service_started
    restart: unless-stopped
    networks:
      - app

  # Development backend with Spring Boot devtools + Maven run.
  backend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: backend-spring/Dockerfile
      target: development
    environment:
      PORT: 5000
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      MYSQL_URL: ${MYSQL_URL:-jdbc:mysql://mysql:3306/ivyts_1997?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-ivyts}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ivyts}
      CLIENT_URL: ${DEV_CLIENT_URL:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-me1}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-me}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    command: mvn -B spring-boot:run
    volumes:
      - ./backend-spring/src:/app/src
      - ./backend-spring/pom.xml:/app/pom.xml:ro
    ports:
      - "${BACKEND_DEV_PORT:-5000}:5000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      app:
        aliases:
          - backend-app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
